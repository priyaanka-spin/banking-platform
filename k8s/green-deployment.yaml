apiVersion: apps/v1
kind: Deployment

metadata:
  name: banking-app-green

spec:
  replicas: 2

  selector:
    matchLabels:
      app: banking-app-green

  template:
    metadata:
      labels:
        app: banking-app-green

    spec:
      containers:
      - name: banking-app-green

        image: 33352005/banking-app:latest


        ports:
        - containerPort: 5000

        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: banking-config
              key: APP_ENV

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: banking-secret
              key: DB_USERNAME

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banking-secret
              key: DB_PASSWORD
